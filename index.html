async function callAI(msgs,level){const r=await fetch("/api/chat",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({messages:msgs,level})});if(!r.ok)throw new Error("API Error "+r.status);const d=await r.json();if(d.error)throw new Error(d.error);return d.reply;}
